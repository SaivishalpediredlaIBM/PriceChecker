---
apiVersion: v1
kind: Namespace
metadata:
  name: price-comparison

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: price-chatbot-config
  namespace: price-comparison
data:
  QUARKUS_HTTP_PORT: "8080"
  QUARKUS_DATASOURCE_DB_KIND: "postgresql"
  QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: "update"

---
apiVersion: v1
kind: Secret
metadata:
  name: price-chatbot-secrets
  namespace: price-comparison
type: Opaque
stringData:
  OPENAI_API_KEY: "your-openai-api-key-here"
  DATABASE_URL: "jdbc:postgresql://postgres:5432/pricedb"
  DATABASE_USERNAME: "priceuser"
  DATABASE_PASSWORD: "your-secure-password"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-chatbot
  namespace: price-comparison
  labels:
    app: price-chatbot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: price-chatbot
  template:
    metadata:
      labels:
        app: price-chatbot
    spec:
      containers:
      - name: price-chatbot
        image: price-chatbot:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: QUARKUS_HTTP_PORT
          valueFrom:
            configMapKeyRef:
              name: price-chatbot-config
              key: QUARKUS_HTTP_PORT
        - name: QUARKUS_DATASOURCE_DB_KIND
          valueFrom:
            configMapKeyRef:
              name: price-chatbot-config
              key: QUARKUS_DATASOURCE_DB_KIND
        - name: QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION
          valueFrom:
            configMapKeyRef:
              name: price-chatbot-config
              key: QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: price-chatbot-secrets
              key: OPENAI_API_KEY
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: price-chatbot-secrets
              key: DATABASE_URL
        - name: DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: price-chatbot-secrets
              key: DATABASE_USERNAME
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: price-chatbot-secrets
              key: DATABASE_PASSWORD
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /q/health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /q/health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: price-chatbot-service
  namespace: price-comparison
  labels:
    app: price-chatbot
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: price-chatbot

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: price-chatbot-hpa
  namespace: price-comparison
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: price-chatbot
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# PostgreSQL Database (for production use)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: price-comparison
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: pricedb
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: price-chatbot-secrets
              key: DATABASE_USERNAME
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: price-chatbot-secrets
              key: DATABASE_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: price-comparison
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres
  clusterIP: None

