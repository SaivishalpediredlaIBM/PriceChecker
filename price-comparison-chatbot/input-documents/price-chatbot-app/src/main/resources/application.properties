# Application Configuration
quarkus.application.name=price-comparison-chatbot

# ── HTTP ────────────────────────────────────────────────────────
quarkus.http.port=8080
quarkus.http.host=0.0.0.0
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# ── Database – H2 (dev/test default) ────────────────────────────
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:pricedb;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# ── Hibernate ───────────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=import.sql

# ── LangChain4j / OpenAI ─────────────────────────────────────────
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:your-api-key-here}
quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
quarkus.langchain4j.openai.chat-model.temperature=0.7
quarkus.langchain4j.openai.chat-model.max-tokens=2000
quarkus.langchain4j.openai.timeout=60s
quarkus.langchain4j.openai.log-requests=false
quarkus.langchain4j.openai.log-responses=false

# Alternative: IBM watsonx.ai (uncomment to use instead of OpenAI)
# quarkus.langchain4j.watsonx.api-key=${WATSONX_API_KEY}
# quarkus.langchain4j.watsonx.project-id=${WATSONX_PROJECT_ID}
# quarkus.langchain4j.watsonx.chat-model.model-id=ibm/granite-13b-chat-v2
# quarkus.langchain4j.watsonx.chat-model.temperature=0.7

# ── Health checks ────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/q/health
quarkus.smallrye-health.liveness-path=/q/health/live
quarkus.smallrye-health.readiness-path=/q/health/ready

# ── Logging ──────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."org.acme".level=DEBUG
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# ── Container image (used by: mvn package -Dquarkus.container-image.build=true)
quarkus.container-image.name=price-comparison-chatbot
quarkus.container-image.tag=latest
quarkus.container-image.build=false

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Development profile overrides  (%dev.)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
%dev.quarkus.http.port=8080
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.langchain4j.openai.log-requests=true
%dev.quarkus.langchain4j.openai.log-responses=true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Production profile overrides  (%prod.)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
%prod.quarkus.hibernate-orm.database.generation=update
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${DATABASE_URL}
%prod.quarkus.datasource.username=${DATABASE_USERNAME}
%prod.quarkus.datasource.password=${DATABASE_PASSWORD}
%prod.quarkus.log.level=WARN
%prod.quarkus.log.category."org.acme".level=INFO
